<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>M5 Servo Controller</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
    font-family:sans-serif;
    padding:30px;
}

button{
    width:150px;
    height:50px;
    margin:10px;
    font-size:20px;
}

input{
    width:100px;
    font-size:20px;
}

</style>
</head>

<body>

<h1>M5Stack Servo Controller</h1>

<p>
角度:
<input type="number" id="angle" value="180">
</p>

<p>
時間(ms):
<input type="number" id="duration" value="500">
</p>

<button onclick="sendServo()">
送信
</button>

<button onclick="lockServo()">
LOCK
</button>

<button onclick="openServo()">
OPEN
</button>

<p id="status">未接続</p>

<script>

// MQTT接続
const client = mqtt.connect(
    "wss://broker.hivemq.com:8884/mqtt"
);

client.on("connect", () => {

    console.log("MQTT connected");

    document.getElementById("status").innerText =
        "MQTT接続成功";
});

// ===== 任意送信 =====
function sendServo(){

    const angle =
        parseInt(document.getElementById("angle").value);

    const duration =
        parseInt(document.getElementById("duration").value);

    const msg = {

        angle: angle,
        duration: duration
    };

    client.publish(
        "m5stack/device_02/servo",
        JSON.stringify(msg)
    );

    console.log(msg);
}

// ===== LOCK =====
function lockServo(){

    const msg = {

        angle: 0,
        duration: 500
    };

    client.publish(
        "m5stack/device_02/servo",
        JSON.stringify(msg)
    );
}

// ===== OPEN =====
function openServo(){

    const msg = {

        angle: 180,
        duration: 500
    };

    client.publish(
        "m5stack/device_02/servo",
        JSON.stringify(msg)
    );
}

</script>

</body>
</html>
